<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ if .Title }}{{ .Title }}{{ else }}{{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else if .Summary }}{{ .Summary | plainify | truncate 160 }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  {{ $sass := resources.Get "sass/main.scss" | css.Sass | resources.Minify | resources.Fingerprint }}
  <link rel="stylesheet" href="{{ $sass.RelPermalink }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "/feed.xml" | absURL }}" />
</head>

  <body>
<header class="site-header">
  <a href="{{ .Site.BaseURL }}"><img src="/media/jo-circle.svg" alt="{{ .Site.Params.author }}"></a>
  <h1 class="site-title"><a href="{{ .Site.BaseURL }}">{{ .Site.Params.author }}</a></h1>
</header>
    <div id="content">
        {{ block "main" . }}{{ end }}
    </div>

<footer class="site-footer">
  &copy; 2006&ndash;{{ now.Format "2006" }} {{ .Site.Params.author }}
</footer>

  </body>

</html>
